services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sistercontrol
      POSTGRES_USER: sistercontrol
      POSTGRES_PASSWORD: sistercontrol
    ports:
      - "5432:5432"
    volumes:
      - sistercontrol-postgres:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: sistercontrol
      PGUSER: sistercontrol
      PGPASSWORD: sistercontrol
      PORT: 3000
      DETECTOR_HOST: localhost
      DETECTOR_PORT: 8080
      OLLAMA_HOST: host.docker.internal
      OLLAMA_PORT: 11434
    ports:
      - "3000:3000"
      - "8080:8080"

volumes:
  sistercontrol-postgres:
